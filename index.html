<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numerical Calculus - Study Guide</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <script src="js/data.js"></script>
    <script defer src="js/app.js"></script>
</head>
<body class="light-theme">
    <aside id="sidebar">
        <div class="sidebar-header">
            <h1>Numerical Calculus</h1>
            <button id="theme-toggle" title="Toggle Theme">
                <span class="icon">🌓</span>
            </button>
        </div>
        <div class="search-box">
            <input type="text" id="search-input" placeholder="Search topics...">
        </div>
        <nav id="nav-links">
            <!-- Nav links will be populated by app.js -->
        </nav>
        <div class="sidebar-footer">
            <a href="#audit">Content Audit</a>
            <a href="#corrections">Corrections Log</a>
        </div>
    </aside>

    <main id="main-content">
        <header id="content-header">
            <button id="menu-toggle" class="mobile-only">☰</button>
            <div id="breadcrumb">Chapter 1 / Section 1.1</div>
        </header>
        
        <article id="article-body">
            <!-- Content will be populated by app.js -->
            <div id="welcome-screen">
                <h2>Welcome to the Numerical Calculus Study Guide</h2>
                <p>Select a chapter from the sidebar to begin. This guide contains complete course notes, theorems, algorithms, and examples.</p>
                <div class="quick-links">
                    <button onclick="app.navigateTo('c2')">Start with Matrices</button>
                    <button onclick="app.navigateTo('notation')">Notation Sheet</button>
                </div>
            </div>
        </article>

        <footer id="content-footer">
            <div class="nav-buttons">
                <button id="prev-btn" class="nav-btn">← Previous</button>
                <button id="next-btn" class="nav-btn">Next →</button>
            </div>
        </footer>
    </main>

    <div id="mobile-overlay"></div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            renderMathInElement(document.body, {
                delimiters: [
                    {left: '$$', right: '$$', display: true},
                    {left: '$', right: '$', display: false},
                    {left: '\\(', right: '\\)', display: false},
                    {left: '\\[', right: '\\]', display: true}
                ],
                throwOnError : false
            });
        });
    </script>
</body>
</html>
