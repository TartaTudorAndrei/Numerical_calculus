<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numerical Calculus - Study Guide</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,300..900;1,300..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <script src="content/ch1/data.js"></script>
    <script src="content/ch2/data.js"></script>
    <script src="content/ch3/data.js"></script>
    <script src="content/ch4/data.js"></script>
    <script src="content/ch5/data.js"></script>
    <script src="content/ch6/data.js"></script>
    <script src="content/ch7/data.js"></script>
    <script src="content/ch8/data.js"></script>
    <script src="js/data.js"></script>
    <script src="js/modules/theme.js"></script>
    <script src="js/modules/search.js"></script>
    <script src="js/modules/ui.js"></script>
    <script src="js/modules/interactive.js"></script>
    <script defer src="js/app.js"></script>
</head>
<body class="light-theme">
    <aside id="sidebar" role="complementary" aria-label="Course Navigation">
        <div class="sidebar-header">
            <h1>Numerical Calculus</h1>
            <button id="theme-toggle" title="Toggle Theme" aria-label="Toggle dark/light theme">
                <span class="icon" aria-hidden="true">🌓</span>
            </button>
        </div>
        <div class="search-box">
            <input type="text" id="search-input" placeholder="Search topics..." aria-label="Search study topics">
        </div>
        <nav id="nav-links" aria-label="Chapter and section links">
            <!-- Nav links will be populated by app.js -->
        </nav>
        <div class="sidebar-footer">
            <a href="#audit" aria-label="Go to Content Audit">Content Audit</a>
            <a href="#corrections" aria-label="Go to Corrections Log">Corrections Log</a>
        </div>
    </aside>

    <main id="main-content" role="main">
        <div id="scroll-progress" aria-hidden="true">
            <div id="progress-bar"></div>
        </div>
        <header id="content-header">
            <button id="menu-toggle" class="mobile-only" aria-label="Open navigation menu" aria-expanded="false" aria-controls="sidebar">☰</button>
            <div id="breadcrumb" aria-label="Breadcrumb navigation">Chapter 1 / Section 1.1</div>
        </header>
        
        <article id="article-body" aria-live="polite">
            <!-- Content will be populated by app.js -->
            <div id="welcome-screen">
                <h2>Welcome to the Numerical Calculus Study Guide</h2>
                <p>Select a chapter from the sidebar to begin. This guide contains complete course notes, theorems, algorithms, and examples.</p>
                <div class="quick-links">
                    <button class="nav-btn" onclick="app.navigateTo('c2-special-matrices')">Start with Matrices</button>
                    <button class="nav-btn" onclick="app.navigateTo('corrections')">View Corrections Log</button>
                </div>
            </div>
        </article>

        <footer id="content-footer">
            <div class="nav-buttons">
                <button id="prev-btn" class="nav-btn">← Previous</button>
                <button id="next-btn" class="nav-btn">Next →</button>
            </div>
        </footer>
    </main>

    <div id="mobile-overlay"></div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            renderMathInElement(document.body, {
                delimiters: [
                    {left: '$$', right: '$$', display: true},
                    {left: '$', right: '$', display: false},
                    {left: '\\(', right: '\\)', display: false},
                    {left: '\\[', right: '\\]', display: true}
                ],
                throwOnError : false
            });
        });
    </script>
</body>
</html>
